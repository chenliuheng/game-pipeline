<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✍️ 字母书写 - 蒙氏教育</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: linear-gradient(135deg, #fff8e1, #ffecb3); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            font-family: 'Comic Sans MS', cursive, sans-serif;
            padding: 20px;
        }
        h1 { color: #f57f17; margin-bottom: 10px; }
        #letter-display {
            width: min(80vw, 200px);
            height: min(80vw, 200px);
            background: #fff;
            border: 4px solid #f57f17;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 100px;
            margin: 15px 0;
            cursor: pointer;
            user-select: none;
            position: relative;
        }
        #letter-display::after {
            content: '点击更换';
            position: absolute;
            bottom: 10px;
            font-size: 12px;
            color: #999;
        }
        
        #canvas-container {
            position: relative;
            margin: 15px 0;
        }
        #drawing-canvas {
            background: #fff;
            border: 3px solid #f57f17;
            border-radius: 10px;
            cursor: crosshair;
            touch-action: none;
        }
        #clear-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 8px 15px;
            background: #f57f17;
            color: #fff;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
        }
        
        #letters-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-top: 15px;
        }
        .letter-btn {
            width: 45px;
            height: 45px;
            background: #fff;
            border: 2px solid #f57f17;
            border-radius: 8px;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .letter-btn:hover { background: #fff8e1; transform: scale(1.1); }
        .letter-btn.active { background: #f57f17; color: #fff; }
        
        #message { margin-top: 15px; color: #666; text-align: center; }
    </style>
</head>
<body>
    <h1>✍️ 字母书写练习</h1>
    <p>在虚线上描写字母</p>
    
    <div id="letter-display" onclick="nextLetter()">A</div>
    
    <div id="canvas-container">
        <canvas id="drawing-canvas" width="280" height="280"></canvas>
        <button id="clear-btn" onclick="clearCanvas()">🗑️ 清除</button>
    </div>
    
    <div id="letters-grid"></div>
    
    <div id="message">选择字母开始书写</div>
    
    <script>
        const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
        let currentLetter = 'A';
        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;
        
        // 创建字母按钮
        const grid = document.getElementById('letters-grid');
        letters.forEach(letter => {
            const btn = document.createElement('div');
            btn.className = 'letter-btn';
            btn.textContent = letter;
            btn.onclick = () => selectLetter(letter);
            grid.appendChild(btn);
        });
        
        // 画布设置
        const canvas = document.getElementById('drawing-canvas');
        const ctx = canvas.getContext('2d');
        
        // 绘制虚线格子
        function drawGrid() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 绘制虚线方格
            ctx.strokeStyle = '#e0e0e0';
            ctx.lineWidth = 1;
            const cellSize = 70;
            
            for (let i = 0; i <= 4; i++) {
                ctx.beginPath();
                ctx.moveTo(i * cellSize, 0);
                ctx.lineTo(i * cellSize, canvas.height);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(0, i * cellSize);
                ctx.lineTo(canvas.width, i * cellSize);
                ctx.stroke();
            }
            
            // 绘制示例字母
            ctx.font = 'bold 180px Comic Sans MS';
            ctx.fillStyle = 'rgba(245, 127, 23, 0.2)';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(currentLetter, canvas.width / 2, canvas.height / 2);
        }
        
        // 画线功能
        function startDrawing(e) {
            isDrawing = true;
            const rect = canvas.getBoundingClientRect();
            const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
            const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
            lastX = x;
            lastY = y;
        }
        
        function draw(e) {
            if (!isDrawing) return;
            e.preventDefault();
            
            const rect = canvas.getBoundingClientRect();
            const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
            const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
            
            ctx.strokeStyle = '#f57f17';
            ctx.lineWidth = 8;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(x, y);
            ctx.stroke();
            
            lastX = x;
            lastY = y;
        }
        
        function stopDrawing() {
            isDrawing = false;
        }
        
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseout', stopDrawing);
        
        canvas.addEventListener('touchstart', startDrawing, {passive: false});
        canvas.addEventListener('touchmove', draw, {passive: false});
        canvas.addEventListener('touchend', stopDrawing);
        
        function selectLetter(letter) {
            currentLetter = letter;
            document.getElementById('letter-display').textContent = letter;
            document.querySelectorAll('.letter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent === letter);
            });
            clearCanvas();
            document.getElementById('message').textContent = '描写字母: ' + letter;
        }
        
        function nextLetter() {
            const idx = letters.indexOf(currentLetter);
            const next = letters[(idx + 1) % letters.length];
            selectLetter(next);
        }
        
        function clearCanvas() {
            drawGrid();
        }
        
        // 初始化
        selectLetter('A');
    </script>
</body>
</html>
