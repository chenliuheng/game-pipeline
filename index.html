    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #1a1a2e, #16213e); min-height: 100vh; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { font-size: 2rem; background: linear-gradient(90deg, #ff6b6b, #feca57); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
        .tab { padding: 10px 20px; background: rgba(255,255,255,0.1); border-radius: 20px; cursor: pointer; transition: all 0.3s; }
        .tab.active { background: linear-gradient(90deg, #ff6b6b, #feca57); }
        .section { display: none; }
        .section.active { display: block; }
        .games { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
        .game-card { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 12px; text-align: center; text-decoration: none; color: inherit; transition: all 0.3s; border: 2px solid transparent; }
        .game-card:hover { transform: translateY(-3px); border-color: #4ecdc4; }
        .game-icon { font-size: 2rem; margin-bottom: 5px; }
        .game-title { font-size: 0.85rem; color: #4ecdc4; }
    </style>
</head>

    <script>
        function showTab(id) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(id).classList.add('active');
        }
    </script>
