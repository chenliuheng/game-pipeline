<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📄 折纸游戏 - 蒙氏教育</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: 'Comic Sans MS', cursive, sans-serif;
      padding: 20px;
    }
    h1 { color: #2e7d32; margin-bottom: 10px; }
    #instructions { color: #666; margin-bottom: 20px; }
    
    .paper {
      width: 200px;
      height: 200px;
      background: linear-gradient(135deg, #fff9c4, #fff59d);
      border: 2px solid #f9a825;
      position: relative;
      transition: all 0.5s;
      cursor: pointer;
    }
    
    .fold-line {
      position: absolute;
      background: #f9a825;
    }
    .fold-line.horizontal { width: 100%; height: 2px; top: 50%; }
    .fold-line.vertical { width: 2px; height: 100%; left: 50%; }
    .fold-line.diagonal1 { width: 141%; height: 2px; top: 50%; left: -20%; transform: rotate(45deg); }
    
    .paper.folded { transform: scale(0.5); }
    .paper.folded::after {
      content: '🎉';
      font-size: 48px;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    
    .shapes {
      display: flex;
      gap: 20px;
      margin-top: 30px;
      flex-wrap: wrap;
      justify-content: center;
    }
    
    .shape {
      width: 80px;
      height: 80px;
      cursor: pointer;
      transition: transform 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
    }
    .shape:hover { transform: scale(1.2); }
    
    button {
      padding: 15px 30px;
      background: #2e7d32;
      color: #fff;
      border: none;
      border-radius: 25px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 20px;
    }
    
    #message { margin-top: 20px; font-size: 20px; color: #2e7d32; }
  </style>
</head>
<body>
  <h1>📄 折纸游戏</h1>
  <p id="instructions">点击正方形纸张，然后选择折成的形状</p>
  
  <div class="paper" id="paper" onclick="foldPaper()">
    <div class="fold-line horizontal"></div>
    <div class="fold-line vertical"></div>
  </div>
  
  <div class="shapes" id="shapes">
    <div class="shape" onclick="checkAnswer('triangle')">🔺</div>
    <div class="shape" onclick="checkAnswer('rectangle">⬜</div>
    <div class="shape" onclick="checkAnswer('heart')">❤️</div>
  </div>
  
  <div id="message"></div>
  <button onclick="resetGame()">🔄 重新开始</button>

  <script>
    let folded = false;
    let answered = false;
    
    function foldPaper() {
      if (!folded && !answered) {
        document.getElementById('paper').classList.add('folded');
        folded = true;
        document.getElementById('message').textContent = '折好了！现在是什么形状？';
      }
    }
    
    function checkAnswer(shape) {
      if (!folded || answered) return;
      
      answered = true;
      if (shape === 'triangle') {
        document.getElementById('message').textContent = '🎉 正确！变成三角形了！';
      } else {
        document.getElementById('message').textContent = '再想想... 提示：对折后是三角形';
      }
    }
    
    function resetGame() {
      folded = false;
      answered = false;
      document.getElementById('paper').classList.remove('folded');
      document.getElementById('message').textContent = '';
    }
  </script>
</body>
</html>
