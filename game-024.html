<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌡️ 温觉板 - 蒙氏教育</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: linear-gradient(135deg, #e3f2fd, #bbdefb); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            font-family: 'Comic Sans MS', cursive, sans-serif;
            padding: 20px;
        }
        h1 { color: #1565c0; margin-bottom: 10px; }
        #plates {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 20px 0;
        }
        .plate {
            width: 100px;
            height: 80px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .plate:hover { transform: scale(1.05); }
        .plate .icon { font-size: 30px; }
        .plate .label { font-size: 14px; color: #fff; margin-top: 5px; text-shadow: 1px 1px 2px rgba(0,0,0,0.3); }
        
        .plate.cold { background: linear-gradient(135deg, #4fc3f7, #29b6f6); }
        .plate.cool { background: linear-gradient(135deg, #81d4fa, #4fc3f7); }
        .plate.warm { background: linear-gradient(135deg, #ffb74d, #ffa726); }
        .plate.hot { background: linear-gradient(135deg, #ff8a65, #ff7043); }
        
        #matching-area {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 20px 0;
            padding: 20px;
            background: rgba(255,255,255,0.5);
            border-radius: 15px;
        }
        .match-item {
            width: 90px;
            height: 70px;
            background: #fff;
            border: 3px dashed #1565c0;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .match-item:hover { transform: scale(1.05); }
        .match-item .icon { font-size: 28px; }
        .match-item .label { font-size: 12px; color: #666; }
        
        #score { margin-top: 15px; font-size: 1.3rem; color: #1565c0; }
        #message { margin-top: 10px; color: #666; text-align: center; }
    </style>
</head>
<body>
    <h1>🌡️ 温觉板游戏</h1>
    <p>感受温度，把相同的温度配对</p>
    
    <div id="plates">
        <div class="plate cold" onclick="feel(this, 'cold')">
            <div class="icon">🧊</div>
            <div class="label">冰冷</div>
        </div>
        <div class="plate cool" onclick="feel(this, 'cool')">
            <div class="icon">🍃</div>
            <div class="label">凉爽</div>
        </div>
        <div class="plate warm" onclick="feel(this, 'warm')">
            <div class="icon">☀️</div>
            <div class="label">温暖</div>
        </div>
        <div class="plate hot" onclick="feel(this, 'hot')">
            <div class="icon">🔥</div>
            <div class="label">炎热</div>
        </div>
    </div>
    
    <div id="matching-area">
        <div class="match-item" data-temp="cold" onclick="match(this)">
            <div class="icon">❄️</div>
            <div class="label">?</div>
        </div>
        <div class="match-item" data-temp="cool" onclick="match(this)">
            <div class="icon">💧</div>
            <div class="label">?</div>
        </div>
        <div class="match-item" data-temp="warm" onclick="match(this)">
            <div class="icon">🌤️</div>
            <div class="label">?</div>
        </div>
        <div class="match-item" data-temp="hot" onclick="match(this)">
            <div class="icon">☀️</div>
            <div class="label">?</div>
        </div>
    </div>
    
    <div id="score">配对成功: 0/4</div>
    <div id="message">点击温度板感受温度</div>
    
    <script>
        const tempData = {
            cold: { emoji: '🧊', name: '冰冷' },
            cool: { emoji: '🍃', name: '凉爽' },
            warm: { emoji: '☀️', name: '温暖' },
            hot: { emoji: '🔥', name: '炎热' }
        };
        
        let selectedTemp = null;
        let matched = 0;
        
        function feel(plate, temp) {
            selectedTemp = temp;
            document.querySelectorAll('.plate').forEach(p => p.style.transform = 'scale(1)');
            plate.style.transform = 'scale(1.1)';
            
            const names = { cold: '冰冷', cool: '凉爽', warm: '温暖', hot: '炎热' };
            document.getElementById('message').textContent = '你感觉到: ' + names[temp];
            
            // 视觉反馈 - 改变匹配区选项显示
            updateMatchingOptions(temp);
        }
        
        function updateMatchingOptions(selected) {
            // 打乱选项
            const options = ['cold', 'cool', 'warm', 'hot'].sort(() => Math.random() - 0.5);
            const items = document.querySelectorAll('.match-item');
            
            items.forEach((item, index) => {
                item.dataset.temp = options[index];
                const icons = { cold: '❄️', cool: '💧', warm: '🌤️', hot: '☀️' };
                item.querySelector('.icon').textContent = icons[options[index]];
                item.querySelector('.label').textContent = '?';
                item.style.borderColor = '#1565c0';
                item.style.background = '#fff';
            });
        }
        
        // 初始化时打乱
        updateMatchingOptions();
        
        function match(item) {
            if (!selectedTemp) {
                document.getElementById('message').textContent = '请先点击温度板感受温度！';
                return;
            }
            
            if (item.style.borderColor === 'rgb(76, 175, 80)') return; // 已配对
            
            const itemTemp = item.dataset.temp;
            
            if (itemTemp === selectedTemp) {
                item.style.borderColor = '#4caf50';
                item.style.background = '#e8f5e9';
                const names = { cold: '冰冷', cool: '凉爽', warm: '温暖', hot: '炎热' };
                item.querySelector('.label').textContent = names[itemTemp];
                matched++;
                document.getElementById('score').textContent = '配对成功: ' + matched + '/4';
                document.getElementById('message').textContent = '🎉 配对成功！';
                
                if (matched >= 4) {
                    setTimeout(() => alert('🎉 太棒了！所有温度都配对成功！'), 300);
                }
            } else {
                item.style.animation = 'shake 0.3s';
                setTimeout(() => item.style.animation = '', 300);
                document.getElementById('message').textContent = '😕 温度不对，再试试！';
            }
        }
        
        const style = document.createElement('style');
        style.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                25% { transform: translateX(-5px); }
                75% { transform: translateX(5px); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
