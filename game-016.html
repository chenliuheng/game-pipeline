<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔴 颜色配对 - 蒙氏教育</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #e8eaf6, #c5cae9);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: 'Comic Sans MS', cursive, sans-serif;
      padding: 20px;
    }
    h1 { color: #303f9f; margin-bottom: 10px; }
    #instructions { color: #666; margin-bottom: 20px; }
    
    .color-row {
      display: flex;
      gap: 20px;
      margin: 20px 0;
      flex-wrap: wrap;
      justify-content: center;
    }
    
    .color-card {
      width: 80px;
      height: 100px;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      border: 3px solid transparent;
    }
    .color-card:hover { transform: scale(1.1); }
    .color-card.selected { border-color: #fff; transform: scale(1.15); }
    .color-card.correct { border-color: #4caf50; }
    .color-card.wrong { border-color: #f44336; }
    
    .color-card.red { background: linear-gradient(135deg, #ef5350, #c62828); }
    .color-card.blue { background: linear-gradient(135deg, #42a5f5, #1565c0); }
    .color-card.yellow { background: linear-gradient(135deg, #ffee58, #f9a825); }
    .color-card.green { background: linear-gradient(135deg, #66bb6a, #2e7d32); }
    .color-card.orange { background: linear-gradient(135deg, #ff9800, #e65100); }
    .color-card.purple { background: linear-gradient(135deg, #ab47bc, #7b1fa2); }
    
    .target {
      width: 100px;
      height: 120px;
      border: 4px dashed #303f9f;
      border-radius: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      background: rgba(255,255,255,0.5);
    }
    
    button {
      padding: 15px 30px;
      background: #303f9f;
      color: #fff;
      border: none;
      border-radius: 25px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 20px;
    }
    
    #score { margin-top: 20px; font-size: 20px; color: #303f9f; }
  </style>
</head>
<body>
  <h1>🔴 颜色配对</h1>
  <p id="instructions">点击颜色卡片，与上方的目标颜色配对</p>
  
  <div class="target" id="target">❓</div>
  
  <div class="color-row" id="cards"></div>
  
  <div id="score">得分: 0</div>
  <button onclick="initGame()">🔄 重新开始</button>

  <script>
    const colors = ['red', 'blue', 'yellow', 'green', 'orange', 'purple'];
    const icons = {red:'🔴', blue:'🔵', yellow:'🟡', green:'🟢', orange:'🟠', purple:'🟣'};
    let targetColor = '';
    let selectedCard = null;
    let score = 0;
    
    function initGame() {
      const cardsContainer = document.getElementById('cards');
      cardsContainer.innerHTML = '';
      
      // 随机选择目标颜色
      targetColor = colors[Math.floor(Math.random() * colors.length)];
      document.getElementById('target').textContent = icons[targetColor];
      
      // 随机打乱颜色
      const shuffled = [...colors].sort(() => Math.random() - 0.5);
      
      shuffled.forEach(color => {
        const card = document.createElement('div');
        card.className = 'color-card ' + color;
        card.textContent = icons[color];
        card.dataset.color = color;
        card.onclick = () => selectCard(card);
        cardsContainer.appendChild(card);
      });
    }
    
    function selectCard(card) {
      if (selectedCard) {
        selectedCard.classList.remove('selected');
      }
      card.classList.add('selected');
      selectedCard = card;
      
      if (card.dataset.color === targetColor) {
        card.classList.add('correct');
        score += 10;
        document.getElementById('score').textContent = '得分: ' + score;
        setTimeout(() => {
          alert('🎉 正确！');
          selectedCard = null;
          initGame();
        }, 500);
      } else {
        setTimeout(() => {
          card.classList.add('wrong');
          setTimeout(() => {
            card.classList.remove('wrong', 'selected');
            selectedCard = null;
          }, 500);
        }, 300);
      }
    }
    
    initGame();
  </script>
</body>
</html>
