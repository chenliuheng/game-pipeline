<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>记忆卡片 - Memory Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            padding: 20px;
        }
        
        h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        #gameContainer {
            display: grid;
            gap: 10px;
            margin: 20px 0;
        }
        
        .card {
            width: min(20vw, 80px);
            height: min(20vw, 80px);
            background: linear-gradient(135deg, #4c1d95, #7c3aed);
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            transition: transform 0.3s, background 0.3s;
            user-select: none;
        }
        
        .card:hover {
            transform: scale(1.05);
        }
        
        .card.flipped {
            background: linear-gradient(135deg, #1e1b4b, #312e81);
            transform: rotateY(180deg);
        }
        
        .card.matched {
            background: linear-gradient(135deg, #059669, #10b981);
            opacity: 0.7;
            cursor: default;
        }
        
        .card .content {
            display: none;
        }
        
        .card.flipped .content,
        .card.matched .content {
            display: block;
        }
        
        .card .back {
            display: block;
        }
        
        .card.flipped .back,
        .card.matched .back {
            display: none;
        }
        
        #infoPanel {
            display: flex;
            gap: 30px;
            margin-top: 15px;
        }
        
        .info-box {
            text-align: center;
        }
        
        .info-label {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 5px;
        }
        
        .info-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #a855f7;
        }
        
        #controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        button {
            padding: 12px 25px;
            font-size: 1rem;
            background: linear-gradient(90deg, #a855f7, #ec4899);
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: scale(1.05);
        }
        
        #difficulty {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }
        
        #difficulty button {
            padding: 8px 15px;
            font-size: 0.85rem;
            background: rgba(168, 85, 247, 0.3);
        }
        
        #difficulty button.active {
            background: linear-gradient(90deg, #a855f7, #ec4899);
        }
        
        #message {
            margin-top: 15px;
            font-size: 1.2rem;
            color: #feca57;
            min-height: 30px;
        }
    </style>
</head>
<body>
    <h1>🃏 记忆卡片</h1>
    <div id="gameContainer"></div>
    <div id="infoPanel">
        <div class="info-box">
            <div class="info-label">步数</div>
            <div class="info-value" id="moves">0</div>
        </div>
        <div class="info-box">
            <div class="info-label">对数</div>
            <div class="info-value" id="pairs">0</div>
        </div>
        <div class="info-box">
            <div class="info-label">时间</div>
            <div class="info-value" id="time">0:00</div>
        </div>
    </div>
    <div id="difficulty">
        <button onclick="setDifficulty(4)" id="btn4" class="active">4对</button>
        <button onclick="setDifficulty(6)" id="btn6">6对</button>
        <button onclick="setDifficulty(8)" id="btn8">8对</button>
        <button onclick="setDifficulty(10)" id="btn10">10对</button>
    </div>
    <div id="controls">
        <button onclick="startGame()">开始游戏</button>
    </div>
    <div id="message"></div>

    <script>
        const emojis = ['🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼', '🐨', '🐯', '🦁', '🐮', '🐷', '🐸', '🐵'];
        
        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let totalPairs = 4;
        let moves = 0;
        let seconds = 0;
        let timer = null;
        let isLocked = false;
        
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }
        
        function initGame() {
            const gameContainer = document.getElementById('gameContainer');
            gameContainer.innerHTML = '';
            
            // 选择emoji
            const selectedEmojis = emojis.slice(0, totalPairs);
            cards = [...selectedEmojis, ...selectedEmojis];
            cards = shuffle(cards);
            
            // 设置网格
            const cols = totalPairs <= 4 ? 4 : totalPairs <= 6 ? 4 : 5;
            gameContainer.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
            
            // 创建卡片
            cards.forEach((emoji, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.index = index;
                card.dataset.emoji = emoji;
                
                card.innerHTML = `
                    <span class="back">❓</span>
                    <span class="content">${emoji}</span>
                `;
                
                card.onclick = () => flipCard(card);
                gameContainer.appendChild(card);
            });
            
            // 调整卡片大小
            const cardSize = totalPairs <= 4 ? 80 : totalPairs <= 6 ? 70 : 60;
            document.querySelectorAll('.card').forEach(card => {
                card.style.width = `${cardSize}px`;
                card.style.height = `${cardSize}px`;
            });
        }
        
        function flipCard(card) {
            if (isLocked) return;
            if (card.classList.contains('flipped')) return;
            if (card.classList.contains('matched')) return;
            if (flippedCards.length >= 2) return;
            
            card.classList.add('flipped');
            flippedCards.push(card);
            
            if (flippedCards.length === 2) {
                moves++;
                document.getElementById('moves').textContent = moves;
                checkMatch();
            }
        }
        
        function checkMatch() {
            isLocked = true;
            
            const [card1, card2] = flippedCards;
            const match = card1.dataset.emoji === card2.dataset.emoji;
            
            if (match) {
                card1.classList.add('matched');
                card2.classList.add('matched');
                matchedPairs++;
                document.getElementById('pairs').textContent = matchedPairs;
                flippedCards = [];
                isLocked = false;
                
                if (matchedPairs === totalPairs) {
                    gameWin();
                }
            } else {
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    flippedCards = [];
                    isLocked = false;
                }, 800);
            }
        }
        
        function gameWin() {
            clearInterval(timer);
            document.getElementById('message').textContent = 
                `🎉 恭喜！用时 ${formatTime(seconds)}，${moves} 步`;
        }
        
        function startGame() {
            matchedPairs = 0;
            moves = 0;
            seconds = 0;
            flippedCards = [];
            isLocked = false;
            
            document.getElementById('moves').textContent = moves;
            document.getElementById('pairs').textContent = matchedPairs;
            document.getElementById('time').textContent = '0:00';
            document.getElementById('message').textContent = '';
            
            initGame();
            
            if (timer) clearInterval(timer);
            timer = setInterval(() => {
                seconds++;
                document.getElementById('time').textContent = formatTime(seconds);
            }, 1000);
        }
        
        function formatTime(secs) {
            const m = Math.floor(secs / 60);
            const s = secs % 60;
            return `${m}:${s.toString().padStart(2, '0')}`;
        }
        
        function setDifficulty(n) {
            totalPairs = n;
            
            document.querySelectorAll('#difficulty button').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn${n}`).classList.add('active');
            
            initGame();
        }
        
        // 初始化
        initGame();
    </script>
</body>
</html>
