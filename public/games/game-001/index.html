<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>贪吃蛇 - Snake Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            overflow: hidden;
            touch-action: none;
        }
        
        h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        #gameContainer {
            position: relative;
            border: 4px solid #00d2ff;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.3);
        }
        
        #gameCanvas {
            display: block;
            background: #0a0a1a;
            border-radius: 6px;
        }
        
        #score {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #00d2ff;
        }
        
        .difficulty-selector {
            display: flex;
            gap: 5px;
            margin-top: 10px;
        }
        
        .diff-btn {
            padding: 8px 15px;
            font-size: 0.8rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .diff-btn.newbie { background: #10b981; color: #fff; }
        .diff-btn.master { background: #f59e0b; color: #fff; }
        .diff-btn.hell { background: #ef4444; color: #fff; }
        .diff-btn.active { 
            transform: scale(1.1);
            box-shadow: 0 0 10px currentColor;
        }
        
        #controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }
        
        button {
            padding: 12px 25px;
            font-size: 1rem;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: scale(1.05);
        }
        
        button:active {
            transform: scale(0.95);
        }
        
        #instructions {
            margin-top: 15px;
            text-align: center;
            color: #888;
            font-size: 0.85rem;
        }
        
        #dpad {
            display: none;
            margin-top: 15px;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 5px;
        }
        
        #dpad button {
            padding: 0;
            font-size: 1.5rem;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            border-radius: 10px;
        }
        
        @media (max-width: 600px) {
            #dpad {
                display: grid;
            }
        }
    </style>
</head>
<body>
    <h1>🐍 贪吃蛇</h1>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="350" height="350"></canvas>
        <div id="score">得分: <span id="scoreValue">0</span></div>
    </div>
    <div class="difficulty-selector">
        <button class="diff-btn newbie active" onclick="setDifficulty('newbie')">🌱 新手</button>
        <button class="diff-btn master" onclick="setDifficulty('master')">🎯 大师</button>
        <button class="diff-btn hell" onclick="setDifficulty('hell')">💀 地狱</button>
    </div>
    <div id="controls">
        <button onclick="startGame()">开始游戏</button>
        <button onclick="resetGame()">重新开始</button>
    </div>
    <div id="dpad">
        <button></button>
        <button onclick="changeDirection('up')">⬆️</button>
        <button></button>
        <button onclick="changeDirection('left')">⬅️</button>
        <button></button>
        <button onclick="changeDirection('right')">➡️</button>
        <button></button>
        <button onclick="changeDirection('down')">⬇️</button>
        <button></button>
    </div>
    <div id="instructions">
        🖱️ 电脑：方向键或WASD控制<br>
        📱 手机：点击下方按钮控制
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const GRID_SIZE = 20;
        const GRID_COUNT = Math.floor(canvas.width / GRID_SIZE);
        
        // 难度配置
        const DIFFICULTY = {
            newbie: { speed: 150, foodCount: 1, winRate: 1.0, name: '🌱 新手' },
            master: { speed: 100, foodCount: 2, winRate: 0.2, name: '🎯 大师' },
            hell: { speed: 60, foodCount: 3, winRate: 0.01, name: '💀 地狱' }
        };
        
        let currentDifficulty = 'newbie';
        let gameSpeed = DIFFICULTY.newbie.speed;
        
        let snake = [];
        let foods = [];
        let direction = { x: 0, y: 0 };
        let nextDirection = { x: 0, y: 0 };
        let score = 0;
        let gameLoop = null;
        let isRunning = false;
        
        function initGame() {
            snake = [
                { x: 5, y: 5 },
                { x: 4, y: 5 },
                { x: 3, y: 5 }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            document.getElementById('scoreValue').textContent = score;
            spawnFoods();
        }
        
        function spawnFoods() {
            foods = [];
            const foodCount = DIFFICULTY[currentDifficulty].foodCount;
            for (let i = 0; i < foodCount; i++) {
                spawnFood();
            }
        }
        
        function spawnFood() {
            let valid = false;
            while (!valid) {
                const food = {
                    x: Math.floor(Math.random() * GRID_COUNT),
                    y: Math.floor(Math.random() * GRID_COUNT)
                };
                valid = !snake.some(s => s.x === food.x && s.y === food.y) &&
                        !foods.some(f => f.x === food.x && f.y === food.y);
                if (valid) foods.push(food);
            }
        }
        
        function draw() {
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = 'rgba(0, 210, 255, 0.1)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= GRID_COUNT; i++) {
                ctx.beginPath();
                ctx.moveTo(i * GRID_SIZE, 0);
                ctx.lineTo(i * GRID_SIZE, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * GRID_SIZE);
                ctx.lineTo(canvas.width, i * GRID_SIZE);
                ctx.stroke();
            }
            
            // 绘制食物
            foods.forEach((food, idx) => {
                const colors = ['#ff6b6b', '#feca57', '#4ecdc4'];
                ctx.fillStyle = colors[idx % colors.length];
                ctx.shadowColor = colors[idx % colors.length];
                ctx.shadowBlur = 15;
                ctx.beginPath();
                ctx.arc(
                    food.x * GRID_SIZE + GRID_SIZE / 2,
                    food.y * GRID_SIZE + GRID_SIZE / 2,
                    GRID_SIZE / 2 - 2,
                    0,
                    Math.PI * 2
                );
                ctx.fill();
                ctx.shadowBlur = 0;
            });
            
            // 绘制蛇
            snake.forEach((segment, index) => {
                const gradient = ctx.createRadialGradient(
                    segment.x * GRID_SIZE + GRID_SIZE / 2,
                    segment.y * GRID_SIZE + GRID_SIZE / 2,
                    0,
                    segment.x * GRID_SIZE + GRID_SIZE / 2,
                    segment.y * GRID_SIZE + GRID_SIZE / 2,
                    GRID_SIZE / 2
                );
                gradient.addColorStop(0, index === 0 ? '#00d2ff' : '#3a7bd5');
                gradient.addColorStop(1, index === 0 ? '#0066aa' : '#1a4a7a');
                
                ctx.fillStyle = gradient;
                ctx.shadowColor = '#00d2ff';
                ctx.shadowBlur = index === 0 ? 15 : 5;
                ctx.fillRect(
                    segment.x * GRID_SIZE + 1,
                    segment.y * GRID_SIZE + 1,
                    GRID_SIZE - 2,
                    GRID_SIZE - 2
                );
            });
            ctx.shadowBlur = 0;
        }
        
        function update() {
            direction = nextDirection;
            
            const head = {
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y
            };
            
            if (head.x < 0 || head.x >= GRID_COUNT || head.y < 0 || head.y >= GRID_COUNT) {
                gameOver();
                return;
            }
            
            if (snake.some(s => s.x === head.x && s.y === head.y)) {
                gameOver();
                return;
            }
            
            snake.unshift(head);
            
            // 吃食物
            const foodIdx = foods.findIndex(f => f.x === head.x && f.y === head.y);
            if (foodIdx !== -1) {
                score += 10;
                document.getElementById('scoreValue').textContent = score;
                foods.splice(foodIdx, 1);
                spawnFood();
                
                // 检查胜利条件（吃完所有食物）
                if (foods.length === 0) {
                    winGame();
                    return;
                }
            } else {
                snake.pop();
            }
        }
        
        function gameOver() {
            isRunning = false;
            clearInterval(gameLoop);
            alert(`游戏结束！得分: ${score}\n点击"开始游戏"重新开始`);
        }
        
        function winGame() {
            isRunning = false;
            clearInterval(gameLoop);
            const winRate = DIFFICULTY[currentDifficulty].winRate * 100;
            alert(`🎉 恭喜通关！\n得分: ${score}\n难度: ${DIFFICULTY[currentDifficulty].name}\n通过率: ${winRate}%\n点击"开始游戏"再来一局`);
        }
        
        function gameStep() {
            update();
            if (isRunning) {
                draw();
            }
        }
        
        function startGame() {
            if (isRunning) return;
            isRunning = true;
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(gameStep, gameSpeed);
        }
        
        function resetGame() {
            isRunning = false;
            clearInterval(gameLoop);
            initGame();
            draw();
        }
        
        function changeDirection(dir) {
            if (!isRunning) return;
            
            switch(dir) {
                case 'up':
                    if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
                    break;
                case 'down':
                    if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
                    break;
                case 'left':
                    if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
                    break;
                case 'right':
                    if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
                    break;
            }
        }
        
        function setDifficulty(diff) {
            currentDifficulty = diff;
            gameSpeed = DIFFICULTY[diff].speed;
            
            document.querySelectorAll('.diff-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.diff-btn.${diff}`).classList.add('active');
            
            if (!isRunning) {
                initGame();
                draw();
            }
        }
        
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    changeDirection('up');
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    changeDirection('down');
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    changeDirection('left');
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    changeDirection('right');
                    break;
            }
        });
        
        initGame();
        draw();
    </script>
</body>
</html>
