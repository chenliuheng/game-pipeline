<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>俄罗斯方块 - Tetris</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            overflow: hidden;
            touch-action: none;
        }
        
        h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #ff6b6b, #feca57);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        #gameWrapper {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }
        
        #gameContainer {
            position: relative;
            border: 4px solid #ff6b6b;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(255, 107, 107, 0.3);
        }
        
        #gameCanvas {
            display: block;
            background: #0a0a1a;
            border-radius: 6px;
        }
        
        #infoPanel {
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-width: 120px;
        }
        
        .info-box {
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        
        .info-label {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 5px;
        }
        
        .info-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ff6b6b;
        }
        
        #nextCanvas {
            display: block;
            background: #0a0a1a;
            border-radius: 5px;
            margin: 0 auto;
        }
        
        #controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        button {
            padding: 10px 20px;
            font-size: 0.9rem;
            background: linear-gradient(90deg, #ff6b6b, #feca57);
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: scale(1.05);
        }
        
        button:active {
            transform: scale(0.95);
        }
        
        #mobileControls {
            display: none;
            margin-top: 15px;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(2, 50px);
            gap: 5px;
        }
        
        #mobileControls button {
            padding: 0;
            font-size: 1.5rem;
        }
        
        @media (max-width: 600px) {
            #gameWrapper {
                flex-direction: column;
                align-items: center;
            }
            #infoPanel {
                flex-direction: row;
                justify-content: center;
            }
            #mobileControls {
                display: grid;
            }
        }
        
        #instructions {
            margin-top: 15px;
            text-align: center;
            color: #888;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <h1>🧱 俄罗斯方块</h1>
    <div id="gameWrapper">
        <div id="gameContainer">
            <canvas id="gameCanvas" width="280" height="400"></canvas>
        </div>
        <div id="infoPanel">
            <div class="info-box">
                <div class="info-label">得分</div>
                <div class="info-value" id="score">0</div>
            </div>
            <div class="info-box">
                <div class="info-label">等级</div>
                <div class="info-value" id="level">1</div>
            </div>
            <div class="info-box">
                <div class="info-label">下一个</div>
                <canvas id="nextCanvas" width="80" height="80"></canvas>
            </div>
        </div>
    </div>
    <div id="controls">
        <button onclick="startGame()">开始</button>
        <button onclick="resetGame()">重置</button>
    </div>
    <div id="mobileControls">
        <button onclick="moveLeft()">⬅️</button>
        <button onclick="rotate()">🔄</button>
        <button onclick="moveRight()">➡️</button>
        <button></button>
        <button onclick="drop()">⬇️</button>
        <button></button>
    </div>
    <div id="instructions">
        🖱️ 电脑：← → 移动 | ↑ 旋转 | ↓ 加速<br>
        📱 手机：使用下方按钮
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const nextCanvas = document.getElementById('nextCanvas');
        const nextCtx = nextCanvas.getContext('2d');
        
        const COLS = 10;
        const ROWS = 20;
        const BLOCK_SIZE = 28;
        const COLORS = [
            null,
            '#00ffff', // I - 青色
            '#ffff00', // O - 黄色
            '#ff00ff', // T - 紫色
            '#00ff00', // S - 绿色
            '#ff0000', // Z - 红色
            '#0000ff', // J - 蓝色
            '#ff8800'  // L - 橙色
        ];
        
        // 方块形状
        const SHAPES = [
            [],
            [[1,1,1,1]],                           // I
            [[2,2],[2,2]],                         // O
            [[0,3,0],[3,3,3]],                     // T
            [[0,4,4],[4,4,0]],                     // S
            [[5,5,0],[0,5,5]],                     // Z
            [[6,0,0],[6,6,6]],                     // J
            [[0,0,7],[7,7,7]]                      // L
        ];
        
        let board = [];
        let currentPiece = null;
        let nextPiece = null;
        let score = 0;
        let level = 1;
        let gameLoop = null;
        let isRunning = false;
        
        function initBoard() {
            board = Array(ROWS).fill(null).map(() => Array(COLS).fill(0));
        }
        
        function createPiece(type) {
            const shape = SHAPES[type].map(row => [...row]);
            return {
                shape: shape,
                type: type,
                x: Math.floor(COLS / 2) - Math.floor(shape[0].length / 2),
                y: 0
            };
        }
        
        function randomPiece() {
            return createPiece(Math.floor(Math.random() * 7) + 1);
        }
        
        function drawBlock(ctx, x, y, color, size = BLOCK_SIZE) {
            ctx.fillStyle = color;
            ctx.fillRect(x * size, y * size, size, size);
            
            // 高光效果
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            ctx.fillRect(x * size, y * size, size, 3);
            ctx.fillRect(x * size, y * size, 3, size);
            
            // 阴影效果
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.fillRect(x * size, y * size + size - 3, size, 3);
            ctx.fillRect(x * size + size - 3, y * size, 3, size);
            
            ctx.strokeStyle = 'rgba(0,0,0,0.5)';
            ctx.lineWidth = 1;
            ctx.strokeRect(x * size, y * size, size, size);
        }
        
        function draw() {
            // 清空画布
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制网格
            ctx.strokeStyle = 'rgba(255,255,255,0.05)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= COLS; i++) {
                ctx.beginPath();
                ctx.moveTo(i * BLOCK_SIZE, 0);
                ctx.lineTo(i * BLOCK_SIZE, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i <= ROWS; i++) {
                ctx.beginPath();
                ctx.moveTo(0, i * BLOCK_SIZE);
                ctx.lineTo(canvas.width, i * BLOCK_SIZE);
                ctx.stroke();
            }
            
            // 绘制已落下的方块
            for (let y = 0; y < ROWS; y++) {
                for (let x = 0; x < COLS; x++) {
                    if (board[y][x]) {
                        drawBlock(ctx, x, y, COLORS[board[y][x]]);
                    }
                }
            }
            
            // 绘制当前方块
            if (currentPiece) {
                currentPiece.shape.forEach((row, dy) => {
                    row.forEach((value, dx) => {
                        if (value) {
                            drawBlock(ctx, currentPiece.x + dx, currentPiece.y + dy, COLORS[value]);
                        }
                    });
                });
            }
            
            // 绘制下一个方块预览
            nextCtx.fillStyle = '#0a0a1a';
            nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
            if (nextPiece) {
                const blockSize = 18;
                const offsetX = (nextCanvas.width / blockSize - nextPiece.shape[0].length) / 2;
                const offsetY = (nextCanvas.height / blockSize - nextPiece.shape.length) / 2;
                nextPiece.shape.forEach((row, dy) => {
                    row.forEach((value, dx) => {
                        if (value) {
                            drawBlock(nextCtx, offsetX + dx, offsetY + dy, COLORS[value], blockSize);
                        }
                    });
                });
            }
        }
        
        function collide(piece, offsetX = 0, offsetY = 0) {
            for (let y = 0; y < piece.shape.length; y++) {
                for (let x = 0; x < piece.shape[y].length; x++) {
                    if (piece.shape[y][x]) {
                        const newX = piece.x + x + offsetX;
                        const newY = piece.y + y + offsetY;
                        if (newX < 0 || newX >= COLS || newY >= ROWS) {
                            return true;
                        }
                        if (newY >= 0 && board[newY][newX]) {
                            return true;
                        }
                    }
                }
            }
            return false;
        }
        
        function merge(piece) {
            piece.shape.forEach((row, dy) => {
                row.forEach((value, dx) => {
                    if (value) {
                        board[piece.y + dy][piece.x + dx] = value;
                    }
                });
            });
        }
        
        function clearLines() {
            let lines = 0;
            for (let y = ROWS - 1; y >= 0; y--) {
                if (board[y].every(cell => cell !== 0)) {
                    board.splice(y, 1);
                    board.unshift(Array(COLS).fill(0));
                    lines++;
                    y++;
                }
            }
            if (lines > 0) {
                score += lines * 100 * lines; // 连续消除加分
                level = Math.floor(score / 1000) + 1;
                document.getElementById('score').textContent = score;
                document.getElementById('level').textContent = level;
            }
        }
        
        function rotatePiece() {
            const rotated = currentPiece.shape[0].map((_, i) => 
                currentPiece.shape.map(row => row[i]).reverse()
            );
            const oldShape = currentPiece.shape;
            currentPiece.shape = rotated;
            
            // 如果旋转后碰撞，尝试左右移动
            if (collide(currentPiece)) {
                if (!collide(currentPiece, -1, 0)) {
                    currentPiece.x -= 1;
                } else if (!collide(currentPiece, 1, 0)) {
                    currentPiece.x += 1;
                } else {
                    currentPiece.shape = oldShape;
                }
            }
        }
        
        function moveLeft() {
            if (!isRunning) return;
            if (!collide(currentPiece, -1, 0)) {
                currentPiece.x--;
                draw();
            }
        }
        
        function moveRight() {
            if (!isRunning) return;
            if (!collide(currentPiece, 1, 0)) {
                currentPiece.x++;
                draw();
            }
        }
        
        function drop() {
            if (!isRunning) return;
            if (!collide(currentPiece, 0, 1)) {
                currentPiece.y++;
                draw();
            } else {
                merge(currentPiece);
                clearLines();
                spawnPiece();
                draw();
            }
        }
        
        function rotate() {
            if (!isRunning) return;
            rotatePiece();
            draw();
        }
        
        function hardDrop() {
            if (!isRunning) return;
            while (!collide(currentPiece, 0, 1)) {
                currentPiece.y++;
                score += 2;
            }
            merge(currentPiece);
            clearLines();
            spawnPiece();
            draw();
        }
        
        function spawnPiece() {
            currentPiece = nextPiece || randomPiece();
            nextPiece = randomPiece();
            
            // 检查游戏结束
            if (collide(currentPiece)) {
                gameOver();
            }
        }
        
        function gameOver() {
            isRunning = false;
            clearInterval(gameLoop);
            alert(`游戏结束！得分: ${score}\n等级: ${level}\n点击"开始"重新开始`);
        }
        
        function update() {
            if (!collide(currentPiece, 0, 1)) {
                currentPiece.y++;
            } else {
                merge(currentPiece);
                clearLines();
                spawnPiece();
            }
            draw();
        }
        
        function startGame() {
            if (isRunning) return;
            initBoard();
            nextPiece = randomPiece();
            spawnPiece();
            isRunning = true;
            score = 0;
            level = 1;
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(update, Math.max(100, 800 - (level - 1) * 100));
        }
        
        function resetGame() {
            isRunning = false;
            clearInterval(gameLoop);
            initBoard();
            score = 0;
            level = 1;
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            draw();
        }
        
        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (!isRunning) return;
            
            switch(e.key) {
                case 'ArrowLeft':
                    moveLeft();
                    break;
                case 'ArrowRight':
                    moveRight();
                    break;
                case 'ArrowDown':
                    drop();
                    break;
                case 'ArrowUp':
                    rotate();
                    break;
                case ' ':
                    hardDrop();
                    break;
            }
        });
        
        // 初始化
        initBoard();
        draw();
    </script>
</body>
</html>
