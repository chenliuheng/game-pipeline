<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦞 游戏门户 - Game Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            padding: 20px;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 2rem;
            background: linear-gradient(90deg, #ff6b6b, #feca57);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #888;
        }
        
        #gamesContainer {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .game-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            border: 2px solid transparent;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        
        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border-color: #4ecdc4;
        }
        
        .game-preview {
            height: 150px;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }
        
        .game-info {
            padding: 15px;
        }
        
        .game-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 5px;
            color: #4ecdc4;
        }
        
        .game-description {
            font-size: 0.9rem;
            color: #aaa;
            margin-bottom: 10px;
        }
        
        .game-age {
            display: inline-block;
            background: rgba(78, 205, 196, 0.2);
            color: #4ecdc4;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 0.8rem;
            margin-right: 5px;
        }
        
        .difficulty-tag {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 0.75rem;
            margin-right: 5px;
        }
        .difficulty-tag.newbie { background: #10b981; }
        .difficulty-tag.master { background: #f59e0b; }
        .difficulty-tag.hell { background: #ef4444; }
        
        footer {
            text-align: center;
            margin-top: 40px;
            color: #666;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>🦞 游戏门户</h1>
        <p class="subtitle">精选好游戏，轻松玩 | 每个游戏3种难度</p>
    </header>
    
    <div id="gamesContainer">
        <a href="games/game-001/" class="game-card">
            <div class="game-preview">🐍</div>
            <div class="game-info">
                <div class="game-title">贪吃蛇</div>
                <div class="game-description">经典贪吃蛇游戏</div>
                <span class="game-age">👶 3-99岁</span>
                <span class="difficulty-tag newbie">🌱新手</span>
                <span class="difficulty-tag master">🎯大师</span>
                <span class="difficulty-tag hell">💀地狱</span>
            </div>
        </a>
        
        <a href="games/game-002/" class="game-card">
            <div class="game-preview">🧱</div>
            <div class="game-info">
                <div class="game-title">俄罗斯方块</div>
                <div class="game-description">经典益智游戏</div>
                <span class="game-age">👶 6-99岁</span>
                <span class="difficulty-tag newbie">🌱新手</span>
                <span class="difficulty-tag master">🎯大师</span>
                <span class="difficulty-tag hell">💀地狱</span>
            </div>
        </a>
        
        <a href="games/game-003/" class="game-card">
            <div class="game-preview">🧩</div>
            <div class="game-info">
                <div class="game-title">数字拼图</div>
                <div class="game-description">滑动拼图游戏</div>
                <span class="game-age">👶 4-99岁</span>
                <span class="difficulty-tag newbie">🌱新手</span>
                <span class="difficulty-tag master">🎯大师</span>
                <span class="difficulty-tag hell">💀地狱</span>
            </div>
        </a>
        
        <a href="games/game-004/" class="game-card">
            <div class="game-preview">🃏</div>
            <div class="game-info">
                <div class="game-title">记忆卡片</div>
                <div class="game-description">翻牌记忆游戏</div>
                <span class="game-age">👶 3-99岁</span>
                <span class="difficulty-tag newbie">🌱新手</span>
                <span class="difficulty-tag master">🎯大师</span>
                <span class="difficulty-tag hell">💀地狱</span>
            </div>
        </a>
        
        <a href="games/game-005/" class="game-card">
            <div class="game-preview">🏀</div>
            <div class="game-info">
                <div class="game-title">弹球游戏</div>
                <div class="game-description">经典打砖块</div>
                <span class="game-age">👶 4-99岁</span>
                <span class="difficulty-tag newbie">🌱新手</span>
                <span class="difficulty-tag master">🎯大师</span>
                <span class="difficulty-tag hell">💀地狱</span>
            </div>
        </a>
    </div>
    
    <footer>
        <p>🎮 自动游戏开发流水线 v1.1 | 每个游戏3种难度</p>
    </footer>
</body>
</html>
