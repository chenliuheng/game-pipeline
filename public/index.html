<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦞 游戏门户 - Game Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            padding: 20px;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 2rem;
            background: linear-gradient(90deg, #ff6b6b, #feca57);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #888;
        }
        
        #gamesContainer {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .game-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            border: 2px solid transparent;
        }
        
        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border-color: #4ecdc4;
        }
        
        .game-preview {
            height: 150px;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }
        
        .game-info {
            padding: 15px;
        }
        
        .game-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 5px;
            color: #4ecdc4;
        }
        
        .game-description {
            font-size: 0.9rem;
            color: #aaa;
            margin-bottom: 10px;
        }
        
        .game-age {
            display: inline-block;
            background: rgba(78, 205, 196, 0.2);
            color: #4ecdc4;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 0.8rem;
        }
        
        footer {
            text-align: center;
            margin-top: 40px;
            color: #666;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>🦞 游戏门户</h1>
        <p class="subtitle">精选好游戏，轻松玩</p>
    </header>
    
    <div id="gamesContainer">
        <!-- 游戏卡片将通过 JavaScript 动态加载 -->
    </div>
    
    <footer>
        <p>🎮 自动游戏开发流水线 v1.0 | 每7分钟产出一个游戏</p>
    </footer>

    <script>
        // 加载游戏列表
        async function loadGames() {
            try {
                const response = await fetch('js/games-list.json');
                const data = await response.json();
                const container = document.getElementById('gamesContainer');
                
                data.games.forEach(game => {
                    const card = document.createElement('div');
                    card.className = 'game-card';
                    card.onclick = () => window.location.href = game.url;
                    
                    card.innerHTML = `
                        <div class="game-preview">🎮</div>
                        <div class="game-info">
                            <div class="game-title">${game.title}</div>
                            <div class="game-description">${game.description}</div>
                            <span class="game-age">👶 ${game.ageRange}岁</span>
                        </div>
                    `;
                    
                    container.appendChild(card);
                });
            } catch (error) {
                console.error('加载游戏列表失败:', error);
            }
        }
        
        loadGames();
    </script>
</body>
</html>
