<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📖 看图识字 - 蒙氏教育游戏</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #E74C3C; --secondary: #C0392B; --accent: #FFD93D; --success: #6BCB77; --bg-gradient: linear-gradient(135deg, #FFEBEE 0%, #FFCDD2 50%, #FFEBEE 100%); }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Nunito', sans-serif; background: var(--bg-gradient); min-height: 100vh; color: #2D3436; }
    body::before { content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-image: radial-gradient(circle at 20% 30%, rgba(231, 76, 60, 0.1) 0%, transparent 50%), radial-gradient(circle at 80% 70%, rgba(192, 57, 43, 0.1) 0%, transparent 50%); pointer-events: none; z-index: 0; }
    .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; position: relative; z-index: 1; }
    header { text-align: center; margin-bottom: 40px; animation: fadeInDown 0.6s ease-out; }
    @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    .back-btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; background: white; border: none; border-radius: 50px; font-family: 'Nunito', sans-serif; font-size: 0.95rem; font-weight: 700; color: #2D3436; text-decoration: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: all 0.3s; margin-bottom: 20px; }
    .back-btn:hover { transform: translateX(-5px); }
    h1 { font-size: 2.5rem; font-weight: 800; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
    .instructions { font-size: 1.1rem; color: #636E72; font-weight: 600; }
    .game-area { background: white; border-radius: 30px; padding: 40px; box-shadow: 0 10px 40px rgba(231, 76, 60, 0.15); margin-bottom: 30px; animation: fadeInUp 0.6s ease-out 0.2s both; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .card { width: 200px; height: 240px; background: linear-gradient(135deg, #FFCDD2, #EF9A9A); border-radius: 25px; margin: 0 auto 30px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s; box-shadow: 0 8px 25px rgba(231, 76, 60, 0.2); }
    .card:hover { transform: scale(1.05); }
    .card-icon { font-size: 5rem; margin-bottom: 10px; }
    .card-word { font-size: 2rem; font-weight: 800; color: var(--primary); }
    .card-pinyin { font-size: 1rem; color: #636E72; }
    .options { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-bottom: 30px; }
    .option { padding: 15px 30px; background: white; border: 3px solid var(--primary); border-radius: 15px; font-size: 1.5rem; font-weight: 700; color: var(--primary); cursor: pointer; transition: all 0.3s; }
    .option:hover { background: #FFEBEE; transform: scale(1.05); }
    .option.correct { background: #C8E6C9; border-color: var(--success); color: var(--success); }
    .option.wrong { background: #FFCDD2; border-color: var(--primary); }
    .progress { text-align: center; font-size: 1.3rem; font-weight: 700; color: var(--primary); margin-bottom: 20px; }
    .message { text-align: center; font-size: 1.5rem; font-weight: 700; min-height: 35px; margin-bottom: 20px; }
    .message.success { color: var(--success); }
    .reset-btn { display: block; margin: 0 auto; padding: 14px 35px; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border: none; border-radius: 50px; font-family: 'Nunito', sans-serif; font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: all 0.3s; box-shadow: 0 6px 20px rgba(231, 76, 60, 0.4); }
    .reset-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(231, 76, 60, 0.5); }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <a href="index.html" class="back-btn">← 返回游戏首页</a>
      <h1>📖 看图识字</h1>
      <p class="instructions">看图，选择正确的汉字</p>
    </header>
    <div class="game-area">
      <div class="card" id="card" onclick="flipCard()">
        <div class="card-icon" id="cardIcon">🍎</div>
        <div class="card-word" id="cardWord">?</div>
        <div class="card-pinyin" id="cardPinyin">点击看答案</div>
      </div>
      <div class="options" id="options"></div>
      <div class="progress">进度: <span id="progress">1</span> / <span id="total">10</span></div>
      <div class="message" id="message"></div>
      <button class="reset-btn" onclick="initGame()">🔄 重新开始</button>
    </div>
  </div>
  <script>
    const words = [
      {icon: '🍎', word: '苹果', pinyin: 'píng guǒ'},
      {icon: '🍌', word: '香蕉', pinyin: 'xiāng jiāo'},
      {icon: '🍊', word: '橙子', pinyin: 'chéng zi'},
      {icon: '🍇', word: '葡萄', pinyin: 'pú tao'},
      {icon: '🍓', word: '草莓', pinyin: 'cǎo méi'},
      {icon: '🚗', word: '汽车', pinyin: 'qì chē'},
      {icon: '🐶', word: '小狗', pinyin: 'xiǎo gǒu'},
      {icon: '🐱', word: '小猫', pinyin: 'xiǎo māo'},
      {icon: '🌸', word: '花朵', pinyin: 'huā duǒ'},
      {icon: '🌳', word: '大树', pinyin: 'dà shù'},
    ];
    let currentIndex = 0;
    let gameWords = [];
    let answered = false;
    
    function initGame() {
      gameWords = [...words].sort(() => Math.random() - 0.5).slice(0, 5);
      currentIndex = 0;
      answered = false;
      document.getElementById('progress').textContent = '1';
      document.getElementById('total').textContent = '5';
      showCard();
    }
    
    function showCard() {
      answered = false;
      const word = gameWords[currentIndex];
      document.getElementById('cardIcon').textContent = word.icon;
      document.getElementById('cardWord').textContent = '?';
      document.getElementById('cardPinyin').textContent = '点击看答案';
      document.getElementById('card').style.background = 'linear-gradient(135deg, #FFCDD2, #EF9A9A)';
      document.getElementById('message').textContent = '';
      
      // Generate options
      const options = [word.word];
      const others = words.filter(w => w.word !== word.word).sort(() => Math.random() - 0.5);
      options.push(others[0].word, others[1].word, others[2].word);
      const shuffled = options.sort(() => Math.random() - 0.5);
      
      const optionsDiv = document.getElementById('options');
      optionsDiv.innerHTML = '';
      shuffled.forEach(opt => {
        const btn = document.createElement('div');
        btn.className = 'option';
        btn.textContent = opt;
        btn.onclick = () => checkAnswer(opt, word.word, btn);
        optionsDiv.appendChild(btn);
      });
    }
    
    function flipCard() {
      if (!answered) {
        const word = gameWords[currentIndex];
        document.getElementById('cardWord').textContent = word.word;
        document.getElementById('cardPinyin').textContent = word.pinyin;
        document.getElementById('card').style.background = 'linear-gradient(135deg, #C8E6C9, #A5D6A7)';
      }
    }
    
    function checkAnswer(selected, correct, btn) {
      if (answered) return;
      answered = true;
      
      const buttons = document.querySelectorAll('.option');
      buttons.forEach(b => b.disabled = true);
      
      if (selected === correct) {
        btn.classList.add('correct');
        document.getElementById('message').textContent = '🎉 正确！';
        document.getElementById('message').className = 'message success';
      } else {
        btn.classList.add('wrong');
        buttons.forEach(b => { if (b.textContent === correct) b.classList.add('correct'); });
        document.getElementById('message').textContent = '再想想~';
      }
      
      setTimeout(() => {
        currentIndex++;
        if (currentIndex >= gameWords.length) {
          document.getElementById('message').textContent = '🎊 全部完成！太棒了！';
        } else {
          document.getElementById('progress').textContent = currentIndex + 1;
          showCard();
        }
      }, 1500);
    }
    
    initGame();
  </script>
</body>
</html>
