<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>➕ 加法基础 - 蒙氏教育</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #e3f2fd, #bbdefb);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: 'Comic Sans MS', cursive, sans-serif;
      padding: 20px;
    }
    h1 { color: #1565c0; margin-bottom: 10px; }
    #instructions { color: #666; margin-bottom: 20px; }
    
    .equation {
      font-size: 60px;
      margin: 30px 0;
      color: #1565c0;
    }
    
    .visual {
      display: flex;
      gap: 30px;
      margin: 20px 0;
    }
    
    .group {
      display: flex;
      gap: 5px;
    }
    
    .item {
      font-size: 40px;
    }
    
    .options {
      display: flex;
      gap: 20px;
      margin: 30px 0;
      flex-wrap: wrap;
      justify-content: center;
    }
    
    .option {
      width: 80px;
      height: 80px;
      background: #fff;
      border: 3px solid #1565c0;
      border-radius: 15px;
      font-size: 36px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .option:hover { background: #e3f2fd; transform: scale(1.1); }
    .option.correct { background: #c8e6c9; border-color: #2e7d32; }
    .option.wrong { background: #ffcdd2; border-color: #c62828; }
    
    button {
      padding: 15px 30px;
      background: #1565c0;
      color: #fff;
      border: none;
      border-radius: 25px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 20px;
    }
    
    #message { margin-top: 20px; font-size: 24px; color: #1565c0; }
  </style>
</head>
<body>
  <h1>➕ 加法基础</h1>
  <p id="instructions">数一数，填一填</p>
  
  <div class="visual">
    <div class="group" id="group1"></div>
    <div style="font-size:40px">+</div>
    <div class="group" id="group2"></div>
    <div style="font-size:40px">=</div>
    <div style="font-size:40px" id="result">?</div>
  </div>
  
  <div class="equation" id="equation">2 + 3 = ?</div>
  
  <div class="options" id="options"></div>
  
  <div id="message"></div>
  <button onclick="initGame()">🔄 下一题</button>

  <script>
    let num1, num2, answer;
    
    function initGame() {
      num1 = Math.floor(Math.random() * 5) + 1;
      num2 = Math.floor(Math.random() * 5) + 1;
      answer = num1 + num2;
      
      document.getElementById('equation').textContent = num1 + ' + ' + num2 + ' = ?';
      document.getElementById('result').textContent = '?';
      
      // 显示视觉化
      const group1 = document.getElementById('group1');
      const group2 = document.getElementById('group2');
      group1.innerHTML = '';
      group2.innerHTML = '';
      
      for (let i = 0; i < num1; i++) {
        const item = document.createElement('span');
        item.className = 'item';
        item.textContent = '🍎';
        group1.appendChild(item);
      }
      
      for (let i = 0; i < num2; i++) {
        const item = document.createElement('span');
        item.className = 'item';
        item.textContent = '🍎';
        group2.appendChild(item);
      }
      
      // 生成选项
      const optionsContainer = document.getElementById('options');
      optionsContainer.innerHTML = '';
      
      const answers = [answer];
      while (answers.length < 4) {
        const r = Math.floor(Math.random() * 10) + 1;
        if (!answers.includes(r)) answers.push(r);
      }
      
      answers.sort(() => Math.random() - 0.5);
      
      answers.forEach(a => {
        const btn = document.createElement('div');
        btn.className = 'option';
        btn.textContent = a;
        btn.onclick = () => checkAnswer(a, btn);
        optionsContainer.appendChild(btn);
      });
      
      document.getElementById('message').textContent = '';
    }
    
    function checkAnswer(a, btn) {
      if (a === answer) {
        btn.classList.add('correct');
        document.getElementById('result').textContent = answer;
        document.getElementById('message').textContent = '🎉 正确！';
        setTimeout(initGame, 1500);
      } else {
        btn.classList.add('wrong');
        setTimeout(() => btn.classList.remove('wrong'), 500);
      }
    }
    
    initGame();
  </script>
</body>
</html>
