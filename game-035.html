<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍎 数量对应 - 蒙氏教育</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #ffebee, #ffcdd2);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: 'Comic Sans MS', cursive, sans-serif;
      padding: 20px;
    }
    h1 { color: #c62828; margin-bottom: 10px; }
    #instructions { color: #666; margin-bottom: 20px; }
    
    .apples {
      display: flex;
      gap: 10px;
      margin: 20px 0;
      flex-wrap: wrap;
      justify-content: center;
    }
    
    .apple {
      font-size: 48px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .apple:hover { transform: scale(1.2); }
    .apple.selected { transform: scale(1.3); }
    
    .numbers {
      display: flex;
      gap: 20px;
      margin: 30px 0;
      flex-wrap: wrap;
      justify-content: center;
    }
    
    .number-btn {
      width: 60px;
      height: 60px;
      background: #fff;
      border: 3px solid #c62828;
      border-radius: 10px;
      font-size: 28px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .number-btn:hover { background: #ffebee; }
    .number-btn.correct { background: #c8e6c9; border-color: #2e7d32; }
    .number-btn.wrong { background: #ffcdd2; border-color: #c62828; }
    
    button {
      padding: 15px 30px;
      background: #c62828;
      color: #fff;
      border: none;
      border-radius: 25px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 20px;
    }
    
    #message { margin-top: 20px; font-size: 20px; color: #c62828; }
  </style>
</head>
<body>
  <h1>🍎 数量对应</h1>
  <p id="instructions">数一数有多少苹果，点击对应的数字</p>
  
  <div class="apples" id="apples"></div>
  
  <div class="numbers" id="numbers"></div>
  
  <div id="message"></div>
  <button onclick="initGame()">🔄 下一题</button>

  <script>
    let currentCount = 0;
    let selectedNum = null;
    
    function initGame() {
      currentCount = Math.floor(Math.random() * 9) + 1;
      
      const applesContainer = document.getElementById('apples');
      applesContainer.innerHTML = '';
      for (let i = 0; i < currentCount; i++) {
        const apple = document.createElement('span');
        apple.className = 'apple';
        apple.textContent = '🍎';
        applesContainer.appendChild(apple);
      }
      
      const numbersContainer = document.getElementById('numbers');
      numbersContainer.innerHTML = '';
      const nums = [1,2,3,4,5,6,7,8,9];
      const shuffled = [...nums].sort(() => Math.random() - 0.5);
      
      shuffled.forEach(num => {
        const btn = document.createElement('div');
        btn.className = 'number-btn';
        btn.textContent = num;
        btn.onclick = () => checkAnswer(num, btn);
        numbersContainer.appendChild(btn);
      });
      
      document.getElementById('message').textContent = '';
    }
    
    function checkAnswer(num, btn) {
      if (num === currentCount) {
        btn.classList.add('correct');
        document.getElementById('message').textContent = '🎉 正确！';
        setTimeout(initGame, 1500);
      } else {
        btn.classList.add('wrong');
        setTimeout(() => btn.classList.remove('wrong'), 500);
      }
    }
    
    initGame();
  </script>
</body>
</html>
