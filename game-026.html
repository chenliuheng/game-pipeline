<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🧩 字母拼图 - 蒙氏教育游戏</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #9B59B6;
      --secondary: #8E44AD;
      --accent: #FFD93D;
      --success: #6BCB77;
      --bg-gradient: linear-gradient(135deg, #F3E5F5 0%, #EDE7F6 50%, #F3E5F5 100%);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Nunito', sans-serif; background: var(--bg-gradient); min-height: 100vh; color: #2D3436; }
    body::before { content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-image: radial-gradient(circle at 20% 30%, rgba(155, 89, 182, 0.1) 0%, transparent 50%), radial-gradient(circle at 80% 70%, rgba(142, 68, 173, 0.1) 0%, transparent 50%); pointer-events: none; z-index: 0; }
    .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; position: relative; z-index: 1; }
    header { text-align: center; margin-bottom: 40px; animation: fadeInDown 0.6s ease-out; }
    @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    .back-btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; background: white; border: none; border-radius: 50px; font-family: 'Nunito', sans-serif; font-size: 0.95rem; font-weight: 700; color: #2D3436; text-decoration: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: all 0.3s; margin-bottom: 20px; }
    .back-btn:hover { transform: translateX(-5px); }
    h1 { font-size: 2.5rem; font-weight: 800; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
    .instructions { font-size: 1.1rem; color: #636E72; font-weight: 600; }
    .game-area { background: white; border-radius: 30px; padding: 40px; box-shadow: 0 10px 40px rgba(155, 89, 182, 0.15); margin-bottom: 30px; animation: fadeInUp 0.6s ease-out 0.2s both; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .letter-selector { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 30px; }
    .letter-btn { width: 50px; height: 50px; background: white; border: 3px solid var(--primary); border-radius: 12px; font-size: 1.5rem; font-weight: 700; color: var(--primary); cursor: pointer; transition: all 0.3s; }
    .letter-btn:hover { background: #F3E5F5; transform: scale(1.1); }
    .letter-btn.active { background: var(--primary); color: white; }
    .puzzle-area { display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; margin-bottom: 30px; }
    .puzzle-piece { width: 80px; height: 80px; background: linear-gradient(135deg, #FFE082, #FFD54F); border: 3px solid var(--accent); border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: 800; color: var(--secondary); cursor: pointer; transition: all 0.3s; }
    .puzzle-piece:hover { transform: scale(1.1) rotate(5deg); box-shadow: 0 8px 25px rgba(255, 217, 61, 0.4); }
    .puzzle-piece.placed { background: linear-gradient(135deg, #C8E6C9, #A5D6A7); border-color: var(--success); }
    .target-slot { width: 80px; height: 80px; background: #F3E5F5; border: 3px dashed var(--primary); border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: var(--primary); }
    .target-slot.filled { border-style: solid; background: #C8E6C9; }
    .score { text-align: center; font-size: 1.5rem; font-weight: 700; color: var(--success); margin-bottom: 20px; }
    .message { text-align: center; font-size: 1.3rem; font-weight: 700; min-height: 35px; margin-bottom: 20px; }
    .message.success { color: var(--success); }
    .reset-btn { display: block; margin: 0 auto; padding: 14px 35px; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border: none; border-radius: 50px; font-family: 'Nunito', sans-serif; font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: all 0.3s; box-shadow: 0 6px 20px rgba(155, 89, 182, 0.4); }
    .reset-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(155, 89, 182, 0.5); }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <a href="index.html" class="back-btn">← 返回游戏首页</a>
      <h1>🧩 字母拼图</h1>
      <p class="instructions">选择字母，把拼图块拖到正确位置</p>
    </header>
    <div class="game-area">
      <div class="letter-selector" id="letterSelector"></div>
      <div class="puzzle-area">
        <div class="target-slot" id="targetSlot">?</div>
        <div class="puzzle-piece" id="puzzlePiece" draggable="true">A</div>
      </div>
      <div class="score">正确: <span id="correct">0</span> / <span id="total">1</span></div>
      <div class="message" id="message"></div>
      <button class="reset-btn" onclick="initGame()">🔄 重新开始</button>
    </div>
  </div>
  <script>
    const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
    let currentLetter = 'A';
    let correct = 0;
    
    function initGame() {
      currentLetter = letters[Math.floor(Math.random() * letters.length)];
      correct = 0;
      document.getElementById('correct').textContent = correct;
      document.getElementById('total').textContent = '1';
      document.getElementById('puzzlePiece').textContent = currentLetter;
      document.getElementById('targetSlot').textContent = '?';
      document.getElementById('targetSlot').classList.remove('filled');
      document.getElementById('message').textContent = '';
      
      // Generate letter buttons
      const selector = document.getElementById('letterSelector');
      selector.innerHTML = '';
      letters.forEach(l => {
        const btn = document.createElement('div');
        btn.className = 'letter-btn' + (l === currentLetter ? ' active' : '');
        btn.textContent = l;
        btn.onclick = () => { currentLetter = l; initGame(); };
        selector.appendChild(btn);
      });
    }
    
    const piece = document.getElementById('puzzlePiece');
    const slot = document.getElementById('targetSlot');
    
    piece.addEventListener('click', () => {
      if (!slot.classList.contains('filled')) {
        slot.textContent = currentLetter;
        slot.classList.add('filled');
        piece.style.opacity = '0.5';
        piece.style.pointerEvents = 'none';
        correct = 1;
        document.getElementById('correct').textContent = correct;
        document.getElementById('message').textContent = '🎉 正确！';
        document.getElementById('message').className = 'message success';
      }
    });
    
    initGame();
  </script>
</body>
</html>
