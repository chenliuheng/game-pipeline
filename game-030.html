<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔗 词汇接龙 - 蒙氏教育</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: linear-gradient(135deg, #fff3e0, #ffe0b2); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            font-family: 'Comic Sans MS', cursive, sans-serif;
            padding: 20px;
        }
        h1 { color: #e65100; margin-bottom: 10px; }
        
        #word-display {
            width: min(90vw, 350px);
            background: #fff;
            border: 3px solid #e65100;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            margin: 15px 0;
        }
        #current-word {
            font-size: 40px;
            color: #e65100;
            font-weight: bold;
            margin-bottom: 10px;
        }
        #word-meaning {
            font-size: 16px;
            color: #666;
        }
        
        #options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin: 15px 0;
        }
        .option-btn {
            padding: 12px 20px;
            background: #fff;
            border: 3px solid #e65100;
            border-radius: 25px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .option-btn:hover { 
            background: #fff3e0; 
            transform: scale(1.05); 
        }
        .option-btn.correct {
            background: #4caf50;
            border-color: #4caf50;
            color: #fff;
        }
        .option-btn.wrong {
            background: #f44336;
            border-color: #f44336;
            color: #fff;
        }
        
        #score { margin-top: 15px; font-size: 1.3rem; color: #e65100; }
        #message { margin-top: 10px; color: #666; text-align: center; }
    </style>
</head>
<body>
    <h1>🔗 词汇接龙</h1>
    <p>根据提示接龙词汇</p>
    
    <div id="word-display">
        <div id="current-word">小猫</div>
        <div id="word-meaning">🐱 动物</div>
    </div>
    
    <div id="options"></div>
    
    <div id="score">得分: 0</div>
    <div id="message">选择下一个词汇</div>
    
    <script>
        const words = [
            { word: '小猫', meaning: '🐱 动物', next: '狗' },
            { word: '小狗', meaning: '🐕 动物', next: '猫' },
            { word: '汽车', meaning: '🚗 交通工具', next: '火车' },
            { word: '火车', meaning: '🚂 交通工具', next: '飞机' },
            { word: '飞机', meaning: '✈️ 交通工具', next: '轮船' },
            { word: '苹果', meaning: '🍎 水果', next: '香蕉' },
            { word: '香蕉', meaning: '🍌 水果', next: '橙子' },
            { word: '橙子', meaning: '🍊 水果', next: '葡萄' },
            { word: '太阳', meaning: '☀️ 自然', next: '月亮' },
            { word: '月亮', meaning: '🌙 自然', next: '星星' },
            { word: '星星', meaning: '⭐ 自然', next: '太阳' },
            { word: '大树', meaning: '🌳 植物', next: '小花' },
            { word: '小花', meaning: '🌸 植物', next: '小草' },
            { word: '小草', meaning: '🌱 植物', next: '大树' }
        ];
        
        let currentIndex = 0;
        let score = 0;
        
        function initGame() {
            currentIndex = 0;
            score = 0;
            showWord();
        }
        
        function showWord() {
            const current = words[currentIndex];
            document.getElementById('current-word').textContent = current.word;
            document.getElementById('word-meaning').textContent = current.meaning;
            
            // 生成选项
            const options = document.getElementById('options');
            options.innerHTML = '';
            
            // 正确答案和3个错误答案
            const wrongOptions = words
                .filter(w => w.next !== current.next)
                .sort(() => Math.random() - 0.5)
                .slice(0, 3)
                .map(w => w.next);
            
            const allOptions = [current.next, ...wrongOptions].sort(() => Math.random() - 0.5);
            
            allOptions.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt;
                btn.onclick = () => checkAnswer(opt, btn);
                options.appendChild(btn);
            });
            
            document.getElementById('score').textContent = '得分: ' + score;
            document.getElementById('message').textContent = '选择下一个词汇';
        }
        
        function checkAnswer(answer, btn) {
            const current = words[currentIndex];
            const buttons = document.querySelectorAll('.option-btn');
            
            if (answer === current.next) {
                btn.classList.add('correct');
                score += 10;
                document.getElementById('message').textContent = '🎉 答对了！';
                
                setTimeout(() => {
                    currentIndex = (currentIndex + 1) % words.length;
                    showWord();
                }, 800);
            } else {
                btn.classList.add('wrong');
                document.getElementById('message').textContent = '😕 不对，答案是: ' + current.next;
                
                // 显示正确答案
                buttons.forEach(b => {
                    if (b.textContent === current.next) {
                        b.classList.add('correct');
                    }
                });
                
                setTimeout(() => {
                    currentIndex = (currentIndex + 1) % words.length;
                    showWord();
                }, 1500);
            }
        }
        
        initGame();
    </script>
</body>
</html>
