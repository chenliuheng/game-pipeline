<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔩 拧螺丝 - 蒙氏教育游戏</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #FF6B9D;
      --secondary: #C44569;
      --accent: #FFD93D;
      --success: #6BCB77;
      --gold: #FFD700;
      --silver: #C0C0C0;
      --bronze: #CD7F32;
      --copper: #B87333;
      --bg-gradient: linear-gradient(135deg, #FFF5F8 0%, #F0F8FF 50%, #FFF9E6 100%);
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg-gradient);
      min-height: 100vh;
      color: #2D3436;
      overflow-x: hidden;
    }
    
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(255, 107, 157, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(77, 150, 255, 0.1) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }
    
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px;
      position: relative;
      z-index: 1;
    }
    
    /* Header */
    header {
      text-align: center;
      margin-bottom: 40px;
      animation: fadeInDown 0.6s ease-out;
    }
    
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: white;
      border: none;
      border-radius: 50px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      color: #2D3436;
      text-decoration: none;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      transition: all 0.3s;
      margin-bottom: 20px;
    }
    
    .back-btn:hover {
      transform: translateX(-5px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    }
    
    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
    }
    
    .instructions {
      font-size: 1.1rem;
      color: #636E72;
      font-weight: 600;
    }
    
    /* Game Area */
    .game-area {
      background: white;
      border-radius: 30px;
      padding: 40px;
      box-shadow: 0 10px 40px rgba(255, 107, 157, 0.15);
      margin-bottom: 30px;
      animation: fadeInUp 0.6s ease-out 0.2s both;
    }
    
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .screw-holes {
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
      margin-bottom: 40px;
    }
    
    .screw-hole {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: all 0.3s;
      cursor: pointer;
    }
    
    .screw-hole.gold {
      background: linear-gradient(135deg, #FFF3CD, #FFE082);
      border: 4px dashed var(--gold);
    }
    .screw-hole.silver {
      background: linear-gradient(135deg, #E8E8E8, #BDBDBD);
      border: 4px dashed var(--silver);
    }
    .screw-hole.bronze {
      background: linear-gradient(135deg, #D7CCC8, #A1887F);
      border: 4px dashed var(--bronze);
    }
    .screw-hole.copper {
      background: linear-gradient(135deg, #FFCCBC, #FF8A65);
      border: 4px dashed var(--copper);
    }
    
    .screw-hole.filled {
      border-style: solid;
    }
    
    .screw-hole.filled.gold { border-color: #4CAF50; background: #C8E6C9; }
    .screw-hole.filled.silver { border-color: #4CAF50; background: #C8E6C9; }
    .screw-hole.filled.bronze { border-color: #4CAF50; background: #C8E6C9; }
    .screw-hole.filled.copper { border-color: #4CAF50; background: #C8E6C9; }
    
    .hole-label {
      font-size: 0.85rem;
      font-weight: 700;
      color: #636E72;
      margin-top: 8px;
    }
    
    .screw-hole .screw {
      font-size: 3rem;
      opacity: 0;
      transform: scale(0);
      transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }
    
    .screw-hole.filled .screw {
      opacity: 1;
      transform: scale(1);
    }
    
    /* Screws Selection */
    .screws-section {
      text-align: center;
      margin-bottom: 30px;
    }
    
    .screws-section h3 {
      font-size: 1.3rem;
      font-weight: 700;
      color: #2D3436;
      margin-bottom: 20px;
    }
    
    .screws-container {
      display: flex;
      justify-content: center;
      gap: 25px;
      flex-wrap: wrap;
    }
    
    .screw-btn {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 4px solid transparent;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      position: relative;
    }
    
    .screw-btn::before {
      content: '';
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      border: 3px solid transparent;
      transition: all 0.3s;
    }
    
    .screw-btn:hover {
      transform: scale(1.1);
    }
    
    .screw-btn.selected::before {
      border-color: var(--primary);
      animation: pulse 1s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.7; }
    }
    
    .screw-btn.gold {
      background: linear-gradient(135deg, #FFD700, #FFA000);
      box-shadow: 0 6px 20px rgba(255, 215, 0, 0.4);
    }
    .screw-btn.silver {
      background: linear-gradient(135deg, #E0E0E0, #9E9E9E);
      box-shadow: 0 6px 20px rgba(158, 158, 158, 0.4);
    }
    .screw-btn.bronze {
      background: linear-gradient(135deg, #D7CCC8, #8D6E63);
      box-shadow: 0 6px 20px rgba(141, 110, 99, 0.4);
    }
    .screw-btn.copper {
      background: linear-gradient(135deg, #FF8A65, #E64A19);
      box-shadow: 0 6px 20px rgba(230, 74, 25, 0.4);
    }
    
    .screw-btn.used {
      opacity: 0.3;
      pointer-events: none;
      transform: scale(0.9);
    }
    
    /* Score & Controls */
    .score-display {
      text-align: center;
      margin-bottom: 25px;
    }
    
    .score {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--success);
    }
    
    .progress-bar {
      width: 100%;
      max-width: 300px;
      height: 12px;
      background: #E0E0E0;
      border-radius: 10px;
      margin: 15px auto 0;
      overflow: hidden;
    }
    
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--success), #4CAF50);
      border-radius: 10px;
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .controls {
      text-align: center;
    }
    
    .reset-btn {
      padding: 14px 35px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      border: none;
      border-radius: 50px;
      font-family: 'Nunito', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 6px 20px rgba(255, 107, 157, 0.4);
    }
    
    .reset-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(255, 107, 157, 0.5);
    }
    
    /* Message */
    .message {
      text-align: center;
      font-size: 1.5rem;
      font-weight: 700;
      min-height: 40px;
      margin-top: 20px;
    }
    
    .message.success { color: var(--success); }
    .message.hint { color: var(--primary); }
    
    /* Win Animation */
    @keyframes winBounce {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    
    .win-animation {
      animation: winBounce 0.5s ease-in-out 3;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <a href="index.html" class="back-btn">
        ← 返回游戏首页
      </a>
      <h1>🔩 拧螺丝</h1>
      <p class="instructions">选择螺丝，拧到对应颜色的孔里</p>
    </header>
    
    <div class="game-area">
      <!-- Screw Holes -->
      <div class="screw-holes">
        <div class="screw-hole gold" data-color="gold" onclick="placeScrew(this)">
          <span class="screw">🔩</span>
          <span class="hole-label">金色</span>
        </div>
        <div class="screw-hole silver" data-color="silver" onclick="placeScrew(this)">
          <span class="screw">🔩</span>
          <span class="hole-label">银色</span>
        </div>
        <div class="screw-hole bronze" data-color="bronze" onclick="placeScrew(this)">
          <span class="screw">🔩</span>
          <span class="hole-label">铜色</span>
        </div>
        <div class="screw-hole copper" data-color="copper" onclick="placeScrew(this)">
          <span class="screw">🔩</span>
          <span class="hole-label">铜红色</span>
        </div>
      </div>
      
      <!-- Screws Selection -->
      <div class="screws-section">
        <h3>👇 选择一个螺丝</h3>
        <div class="screws-container">
          <div class="screw-btn gold" data-color="gold" onclick="selectScrew(this)">🔩</div>
          <div class="screw-btn silver" data-color="silver" onclick="selectScrew(this)">🔩</div>
          <div class="screw-btn bronze" data-color="bronze" onclick="selectScrew(this)">🔩</div>
          <div class="screw-btn copper" data-color="copper" onclick="selectScrew(this)">🔩</div>
        </div>
      </div>
      
      <!-- Score -->
      <div class="score-display">
        <div class="score">已完成: <span id="completed">0</span> / 4</div>
        <div class="progress-bar">
          <div class="progress-fill" id="progress" style="width: 0%"></div>
        </div>
      </div>
      
      <!-- Message -->
      <div class="message" id="message"></div>
      
      <!-- Reset Button -->
      <div class="controls">
        <button class="reset-btn" onclick="resetGame()">🔄 重新开始</button>
      </div>
    </div>
  </div>
  
  <script>
    let selectedScrew = null;
    let completed = 0;
    
    function selectScrew(element) {
      if (element.classList.contains('used')) return;
      
      // Remove previous selection
      document.querySelectorAll('.screw-btn').forEach(btn => btn.classList.remove('selected'));
      
      // Select new screw
      element.classList.add('selected');
      selectedScrew = element;
      
      showMessage('点击对应颜色的孔来放置螺丝', 'hint');
    }
    
    function placeScrew(hole) {
      if (!selectedScrew) {
        showMessage('请先选择一个螺丝！', 'hint');
        return;
      }
      
      // Check if hole already has a screw
      if (hole.classList.contains('filled')) {
        showMessage('这个孔已经有螺丝了！', 'hint');
        return;
      }
      
      const screwColor = selectedScrew.dataset.color;
      const holeColor = hole.dataset.color;
      
      // Check if colors match
      if (screwColor === holeColor) {
        // Success!
        hole.classList.add('filled');
        selectedScrew.classList.add('used');
        selectedScrew.classList.remove('selected');
        selectedScrew = null;
        
        completed++;
        updateScore();
        
        if (completed >= 4) {
          showMessage('🎉 太棒了！所有螺丝都拧好了！', 'success');
          document.querySelector('.game-area').classList.add('win-animation');
        } else {
          showMessage('✅ 正确！继续下一个！', 'success');
        }
      } else {
        showMessage('❌ 颜色不匹配！再试试。', 'hint');
      }
    }
    
    function updateScore() {
      document.getElementById('completed').textContent = completed;
      document.getElementById('progress').style.width = (completed * 25) + '%';
    }
    
    function showMessage(text, type) {
      const messageEl = document.getElementById('message');
      messageEl.textContent = text;
      messageEl.className = 'message ' + type;
    }
    
    function resetGame() {
      completed = 0;
      selectedScrew = null;
      
      // Reset holes
      document.querySelectorAll('.screw-hole').forEach(hole => {
        hole.classList.remove('filled');
      });
      
      // Reset screws
      const screwsContainer = document.querySelector('.screws-container');
      screwsContainer.innerHTML = `
        <div class="screw-btn gold" data-color="gold" onclick="selectScrew(this)">🔩</div>
        <div class="screw-btn silver" data-color="silver" onclick="selectScrew(this)">🔩</div>
        <div class="screw-btn bronze" data-color="bronze" onclick="selectScrew(this)">🔩</div>
        <div class="screw-btn copper" data-color="copper" onclick="selectScrew(this)">🔩</div>
      `;
      
      // Reset score
      updateScore();
      showMessage('', '');
      
      // Remove win animation
      document.querySelector('.game-area').classList.remove('win-animation');
    }
  </script>
</body>
</html>
