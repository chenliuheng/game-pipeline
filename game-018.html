<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔷 形状拼板 - 蒙氏教育</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #e0f7fa, #b2ebf2);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: 'Comic Sans MS', cursive, sans-serif;
      padding: 20px;
    }
    h1 { color: #006064; margin-bottom: 10px; }
    #instructions { color: #666; margin-bottom: 20px; }
    
    .shapes {
      display: flex;
      gap: 20px;
      margin: 20px 0;
      flex-wrap: wrap;
      justify-content: center;
    }
    
    .shape {
      width: 80px;
      height: 80px;
      cursor: pointer;
      transition: transform 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
    }
    .shape:hover { transform: scale(1.2); }
    .shape.selected { transform: scale(1.3); text-shadow: 0 0 10px rgba(0,0,0,0.3); }
    .shape.used { opacity: 0.3; pointer-events: none; }
    
    .board {
      width: 300px;
      height: 300px;
      background: #fff;
      border-radius: 20px;
      border: 4px solid #006064;
      position: relative;
      margin-top: 30px;
    }
    
    .slot {
      position: absolute;
      border: 3px dashed #006064;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      opacity: 0.5;
    }
    
    .slot.circle { width: 80px; height: 80px; border-radius: 50%; top: 20px; left: 20px; }
    .slot.square { width: 80px; height: 80px; top: 20px; right: 20px; }
    .slot.triangle { 
      width: 0; height: 0; 
      border-left: 40px solid transparent;
      border-right: 40px solid transparent;
      border-bottom: 70px solid #006064;
      top: 120px; left: 90px;
      background: transparent;
      border-radius: 0;
    }
    .slot.rectangle { width: 120px; height: 60px; bottom: 20px; left: 90px; }
    
    button {
      padding: 15px 30px;
      background: #006064;
      color: #fff;
      border: none;
      border-radius: 25px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 20px;
    }
    
    #message { margin-top: 20px; font-size: 20px; color: #006064; }
  </style>
</head>
<body>
  <h1>🔷 形状拼板</h1>
  <p id="instructions">把形状拖到对应的位置</p>
  
  <div class="shapes" id="shapes">
    <div class="shape" data-shape="circle" onclick="selectShape(this)">⭕</div>
    <div class="shape" data-shape="square" onclick="selectShape(this)">⬜</div>
    <div class="shape" data-shape="triangle" onclick="selectShape(this)">🔺</div>
    <div class="shape" data-shape="rectangle" onclick="selectShape(this)">🟫</div>
  </div>
  
  <div class="board" onclick="placeShape()">
    <div class="slot circle">⭕</div>
    <div class="slot square">⬜</div>
    <div class="slot triangle"></div>
    <div class="slot rectangle">🟫</div>
  </div>
  
  <div id="message">选择一个形状，再点击board放置</div>
  <button onclick="initGame()">🔄 重新开始</button>

  <script>
    let selected = null;
    let matched = 0;
    
    function selectShape(el) {
      if (el.classList.contains('used')) return;
      document.querySelectorAll('.shape').forEach(s => s.classList.remove('selected'));
      el.classList.add('selected');
      selected = el.dataset.shape;
    }
    
    function placeShape() {
      if (!selected) {
        document.getElementById('message').textContent = '请先选择一个形状！';
        return;
      }
      
      const shape = document.querySelector('.shape.selected');
      shape.classList.add('used');
      shape.classList.remove('selected');
      matched++;
      selected = null;
      
      document.getElementById('message').textContent = '进度: ' + matched + '/4';
      
      if (matched >= 4) {
        document.getElementById('message').textContent = '🎉 太棒了！所有形状都配对成功！';
      }
    }
    
    function initGame() {
      matched = 0;
      selected = null;
      document.querySelectorAll('.shape').forEach(s => {
        s.classList.remove('used', 'selected');
      });
      document.getElementById('message').textContent = '选择一个形状，再点击board放置';
    }
  </script>
</body>
</html>
