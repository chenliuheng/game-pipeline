<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🫗 倒水游戏 - 蒙氏教育游戏</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #4D96FF;
      --secondary: #3B7DD8;
      --accent: #FFD93D;
      --success: #6BCB77;
      --bg-gradient: linear-gradient(135deg, #F0F8FF 0%, #E8F4FD 50%, #F0F8FF 100%);
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg-gradient);
      min-height: 100vh;
      color: #2D3436;
      overflow-x: hidden;
    }
    
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(77, 150, 255, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(107, 203, 119, 0.1) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }
    
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px;
      position: relative;
      z-index: 1;
    }
    
    header {
      text-align: center;
      margin-bottom: 40px;
      animation: fadeInDown 0.6s ease-out;
    }
    
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: white;
      border: none;
      border-radius: 50px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      color: #2D3436;
      text-decoration: none;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      transition: all 0.3s;
      margin-bottom: 20px;
    }
    
    .back-btn:hover {
      transform: translateX(-5px);
    }
    
    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
    }
    
    .instructions {
      font-size: 1.1rem;
      color: #636E72;
      font-weight: 600;
    }
    
    .game-area {
      background: white;
      border-radius: 30px;
      padding: 40px;
      box-shadow: 0 10px 40px rgba(77, 150, 255, 0.15);
      margin-bottom: 30px;
      animation: fadeInUp 0.6s ease-out 0.2s both;
    }
    
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    /* Pitcher */
    .pitcher-area {
      display: flex;
      justify-content: center;
      margin-bottom: 40px;
    }
    
    .pitcher {
      width: 120px;
      height: 160px;
      background: linear-gradient(135deg, #78909C, #546E7A);
      border-radius: 15px 15px 40px 40px;
      position: relative;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
    }
    
    .pitcher:active {
      transform: scale(0.95);
    }
    
    .pitcher::before {
      content: '';
      position: absolute;
      top: -25px;
      left: 50%;
      transform: translateX(-50%);
      width: 35px;
      height: 30px;
      background: linear-gradient(135deg, #78909C, #546E7A);
      border-radius: 8px 8px 0 0;
    }
    
    .pitcher-water {
      position: absolute;
      bottom: 12px;
      left: 12px;
      right: 12px;
      height: 70%;
      background: linear-gradient(to top, #4FC3F7, #29B6F6);
      border-radius: 0 0 30px 30px;
      transition: height 0.5s ease-out;
    }
    
    .pitcher-label {
      position: absolute;
      bottom: -35px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1rem;
      font-weight: 700;
      color: #546E7A;
    }
    
    /* Glasses */
    .glasses-row {
      display: flex;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
      margin-bottom: 30px;
    }
    
    .glass-wrapper {
      text-align: center;
    }
    
    .glass {
      width: 90px;
      height: 140px;
      border: 4px solid var(--primary);
      border-top: none;
      border-radius: 0 0 15px 15px;
      position: relative;
      background: rgba(255,255,255,0.5);
      overflow: hidden;
    }
    
    .glass-water {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, #4FC3F7, #29B6F6);
      transition: height 0.5s ease-out;
      border-radius: 0 0 10px 10px;
    }
    
    .glass-target {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--primary);
      margin-top: 10px;
    }
    
    .glass-actual {
      font-size: 0.85rem;
      color: #636E72;
      margin-top: 5px;
    }
    
    /* Progress */
    .progress-section {
      text-align: center;
      margin-bottom: 25px;
    }
    
    .progress-label {
      font-size: 1.1rem;
      font-weight: 700;
      color: #2D3436;
      margin-bottom: 10px;
    }
    
    .progress-bars {
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
    }
    
    .progress-item {
      text-align: center;
    }
    
    .progress-bar {
      width: 80px;
      height: 100px;
      background: #E0E0E0;
      border-radius: 10px;
      position: relative;
      overflow: hidden;
    }
    
    .progress-fill {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, #4FC3F7, #29B6F6);
      transition: height 0.5s ease-out;
      border-radius: 0 0 8px 8px;
    }
    
    /* Controls */
    .controls {
      text-align: center;
    }
    
    .reset-btn {
      padding: 14px 35px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      border: none;
      border-radius: 50px;
      font-family: 'Nunito', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 6px 20px rgba(77, 150, 255, 0.4);
    }
    
    .reset-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(77, 150, 255, 0.5);
    }
    
    /* Message */
    .message {
      text-align: center;
      font-size: 1.3rem;
      font-weight: 700;
      min-height: 35px;
      margin-top: 20px;
    }
    
    .message.success { color: var(--success); }
    .message.hint { color: var(--primary); }
    
    /* Win Animation */
    @keyframes celebrate {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    
    .win-animation {
      animation: celebrate 0.5s ease-in-out 3;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <a href="index.html" class="back-btn">
        ← 返回游戏首页
      </a>
      <h1>🫗 倒水游戏</h1>
      <p class="instructions">点击水壶倒水，把水倒到目标刻度</p>
    </header>
    
    <div class="game-area">
      <!-- Pitcher -->
      <div class="pitcher-area">
        <div class="pitcher" onclick="pourWater()">
          <div class="pitcher-water" id="pitcher-water"></div>
          <span class="pitcher-label">水壶</span>
        </div>
      </div>
      
      <!-- Glasses -->
      <div class="glasses-row">
        <div class="glass-wrapper">
          <div class="glass">
            <div class="glass-water" id="glass1-water" style="height: 0%"></div>
          </div>
          <div class="glass-target">目标: 80%</div>
          <div class="glass-actual" id="glass1-actual">0%</div>
        </div>
        
        <div class="glass-wrapper">
          <div class="glass">
            <div class="glass-water" id="glass2-water" style="height: 0%"></div>
          </div>
          <div class="glass-target">目标: 50%</div>
          <div class="glass-actual" id="glass2-actual">0%</div>
        </div>
      </div>
      
      <!-- Progress -->
      <div class="progress-section">
        <div class="progress-label">倒水进度</div>
        <div class="progress-bars">
          <div class="progress-item">
            <div class="progress-bar">
              <div class="progress-fill" id="progress1" style="height: 0%"></div>
            </div>
          </div>
          <div class="progress-item">
            <div class="progress-bar">
              <div class="progress-fill" id="progress2" style="height: 0%"></div>
            </div>
          </div>
        </div>
      </div>
      
      <!-- Message -->
      <div class="message" id="message"></div>
      
      <!-- Reset -->
      <div class="controls">
        <button class="reset-btn" onclick="resetGame()">🔄 重新开始</button>
      </div>
    </div>
  </div>
  
  <script>
    let glass1Level = 0;
    let glass2Level = 0;
    let pitcherLevel = 100;
    const target1 = 80;
    const target2 = 50;
    
    function pourWater() {
      if (pitcherLevel <= 0) {
        showMessage('水壶空了！', 'hint');
        return;
      }
      
      // Randomly pour to one glass
      const pourAmount = 20;
      
      if (glass1Level < 100 && (!glass2Level || Math.random() > 0.5)) {
        glass1Level = Math.min(100, glass1Level + pourAmount);
        document.getElementById('glass1-water').style.height = glass1Level + '%';
        document.getElementById('glass1-actual').textContent = glass1Level + '%';
        document.getElementById('progress1').style.height = glass1Level + '%';
      } else if (glass2Level < 100) {
        glass2Level = Math.min(100, glass2Level + pourAmount);
        document.getElementById('glass2-water').style.height = glass2Level + '%';
        document.getElementById('glass2-actual').textContent = glass2Level + '%';
        document.getElementById('progress2').style.height = glass2Level + '%';
      }
      
      pitcherLevel = Math.max(0, pitcherLevel - pourAmount);
      document.getElementById('pitcher-water').style.height = pitcherLevel + '%';
      
      checkWin();
    }
    
    function checkWin() {
      const diff1 = Math.abs(glass1Level - target1);
      const diff2 = Math.abs(glass2Level - target2);
      
      if (diff1 <= 5 && diff2 <= 5) {
        showMessage('🎉 太棒了！水平完美！', 'success');
        document.querySelector('.game-area').classList.add('win-animation');
      } else if (diff1 <= 10 || diff2 <= 10) {
        showMessage('👏 很接近了！', 'success');
      } else if (glass1Level >= 100 && glass2Level >= 100) {
        showMessage('💪 水都满了！再试一次！', 'hint');
      } else {
        showMessage('', '');
      }
    }
    
    function showMessage(text, type) {
      const messageEl = document.getElementById('message');
      messageEl.textContent = text;
      messageEl.className = 'message ' + type;
    }
    
    function resetGame() {
      glass1Level = 0;
      glass2Level = 0;
      pitcherLevel = 100;
      
      document.getElementById('glass1-water').style.height = '0%';
      document.getElementById('glass2-water').style.height = '0%';
      document.getElementById('pitcher-water').style.height = '70%';
      
      document.getElementById('glass1-actual').textContent = '0%';
      document.getElementById('glass2-actual').textContent = '0%';
      
      document.getElementById('progress1').style.height = '0%';
      document.getElementById('progress2').style.height = '0%';
      
      showMessage('', '');
      document.querySelector('.game-area').classList.remove('win-animation');
    }
  </script>
</body>
</html>
